
<style>
.lbl { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
.big { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.card-sm { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; }
</style>
<h2 class="sr-only">Interactive MLE demonstration using coin tosses</h2>

<div style="padding-top:1rem;">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
    <div class="card-sm">
      <p class="lbl">Number of tosses N</p>
      <input type="range" id="n-slider" min="1" max="30" step="1" value="10" style="width:100%; margin:6px 0;">
      <p class="lbl">N = <span id="n-val" style="font-weight:500;color:var(--color-text-primary);">10</span></p>
    </div>
    <div class="card-sm">
      <p class="lbl">Number of heads k</p>
      <input type="range" id="k-slider" min="0" max="10" step="1" value="7" style="width:100%; margin:6px 0;">
      <p class="lbl">k = <span id="k-val" style="font-weight:500;color:var(--color-text-primary);">7</span></p>
    </div>
  </div>

  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px;">
    <div class="card-sm" style="text-align:center;">
      <p class="lbl">MLE estimate θ̂</p>
      <p class="big" id="mle-est">0.700</p>
    </div>
    <div class="card-sm" style="text-align:center;">
      <p class="lbl">Max likelihood</p>
      <p class="big" id="max-lik" style="font-size:16px;">0.00267</p>
    </div>
    <div class="card-sm" style="text-align:center;">
      <p class="lbl">Log-likelihood</p>
      <p class="big" id="log-lik" style="font-size:16px;">−5.92</p>
    </div>
  </div>

  <div style="position:relative; height:220px;">
    <canvas id="coin-chart" role="img" aria-label="Likelihood curve as a function of theta"></canvas>
  </div>
  <p style="font-size:12px; color:var(--color-text-secondary); margin-top:8px; text-align:center;">
    Vertical line: MLE estimate θ̂ = k/N. Curve: L(θ) = θᵏ(1−θ)ᴺ⁻ᵏ
  </p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const tc = isDark ? '#c2c0b6' : '#3d3d3a';
const gc = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';

function binom(n, k) {
  if (k > n) return 0;
  let r = 1;
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1);
  return r;
}

function likelihood(theta, n, k) {
  if (theta <= 0 || theta >= 1) return 0;
  return binom(n, k) * Math.pow(theta, k) * Math.pow(1 - theta, n - k);
}

const thetas = [];
for (let t = 0.01; t <= 0.99; t += 0.01) thetas.push(parseFloat(t.toFixed(2)));

const chart = new Chart(document.getElementById('coin-chart'), {
  type: 'line',
  data: {
    labels: thetas,
    datasets: [
      {
        label: 'L(θ)',
        data: thetas.map(t => likelihood(t, 10, 7)),
        borderColor: '#534AB7',
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.2,
        fill: false
      },
      {
        label: 'MLE',
        type: 'line',
        data: [],
        borderColor: '#D85A30',
        borderWidth: 1.5,
        borderDash: [4, 3],
        pointRadius: 0,
        fill: false
      }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      callbacks: {
        title: items => 'θ = ' + items[0].label,
        label: item => 'L(θ) = ' + item.raw.toFixed(5)
      }
    }},
    scales: {
      x: {
        ticks: { color: tc, maxTicksLimit: 11, callback: (v, i) => thetas[i] % 0.2 < 0.011 ? thetas[i].toFixed(1) : '' },
        grid: { color: gc },
        title: { display: true, text: 'θ (probability of heads)', color: tc, font: { size: 12 } }
      },
      y: {
        ticks: { color: tc },
        grid: { color: gc },
        title: { display: true, text: 'Likelihood L(θ)', color: tc, font: { size: 12 } }
      }
    }
  }
});

function update() {
  const n = parseInt(document.getElementById('n-slider').value);
  const k = Math.min(parseInt(document.getElementById('k-slider').value), n);
  document.getElementById('n-val').textContent = n;
  document.getElementById('k-slider').max = n;
  document.getElementById('k-val').textContent = k;

  const likelihoods = thetas.map(t => likelihood(t, n, k));
  const mleTheta = k / n;
  const maxL = likelihood(mleTheta, n, k);
  const logL = k > 0 && k < n ? k * Math.log(mleTheta) + (n - k) * Math.log(1 - mleTheta) : -Infinity;

  document.getElementById('mle-est').textContent = mleTheta.toFixed(3);
  document.getElementById('max-lik').textContent = maxL < 0.001 ? maxL.toExponential(2) : maxL.toFixed(5);
  document.getElementById('log-lik').textContent = isFinite(logL) ? logL.toFixed(3) : '−∞';

  chart.data.datasets[0].data = likelihoods;

  const mleIdx = thetas.findIndex(t => Math.abs(t - mleTheta) < 0.011);
  const vertLine = thetas.map((t, i) => i === mleIdx ? maxL : null);
  const pts = thetas.map((_, i) => {
    if (Math.abs(_ - mleTheta) < 0.011) return { x: _, y: 0 };
    return null;
  }).filter(Boolean);

  chart.data.datasets[1].data = thetas.map(t => {
    if (Math.abs(t - mleTheta) < 0.016) return maxL * (t <= mleTheta ? t / mleTheta : (1 - t) / (1 - mleTheta));
    return null;
  });
  chart.data.datasets[1].data = thetas.map(t => Math.abs(t - mleTheta) < 0.016 ? maxL : null);
  chart.update('none');
}

document.getElementById('n-slider').addEventListener('input', update);
document.getElementById('k-slider').addEventListener('input', update);
update();
</script>
