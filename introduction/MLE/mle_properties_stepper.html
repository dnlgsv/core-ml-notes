
<style>
.step-dot { width:8px; height:8px; border-radius:50%; background:var(--color-border-secondary); transition:background .2s; display:inline-block; }
.step-dot.active { background:#534AB7; }
.prop-card { background:var(--color-background-secondary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:20px 24px; min-height:130px; }
.prop-title { font-size:15px; font-weight:500; color:var(--color-text-primary); margin:0 0 8px; }
.prop-body { font-size:13px; color:var(--color-text-secondary); line-height:1.65; margin:0 0 10px; }
.prop-eq { font-family:var(--font-mono); font-size:12px; background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-md); padding:6px 10px; display:inline-block; color:var(--color-text-primary); }
</style>
<h2 class="sr-only">Five key properties of Maximum Likelihood Estimation</h2>

<div style="padding-top:1rem;">
  <div id="step-dots" style="display:flex; gap:8px; margin-bottom:16px; justify-content:center;"></div>
  <div id="prop-content" class="prop-card"></div>
  <div style="display:flex; gap:10px; margin-top:14px;">
    <button id="prev-btn" onclick="prevStep()">← Back</button>
    <button id="next-btn" onclick="nextStep()" style="flex:1;">Next →</button>
  </div>
</div>

<script>
const props = [
  {
    title: 'Consistency',
    body: 'As n → ∞, the MLE estimate converges to the true parameter value. More data leads to a more accurate estimate.',
    eq: 'θ̂_MLE →ᵖ θ* as n → ∞',
    extra: 'This is a fundamental guarantee: with enough data, the estimate will not remain stuck at the wrong value.'
  },
  {
    title: 'Asymptotic normality',
    body: 'For large n, the distribution of the estimation error approaches a Gaussian distribution. This is the basis for confidence intervals.',
    eq: '√n(θ̂ − θ*) →ᵈ N(0, I(θ*)⁻¹)',
    extra: 'I(θ) is the Fisher information. More information in the data means a narrower confidence interval.'
  },
  {
    title: 'Efficiency (Cramer-Rao)',
    body: 'MLE reaches the smallest possible variance among a broad class of unbiased estimators, matching the Cramer-Rao lower bound asymptotically.',
    eq: 'Var(θ̂) ≥ 1/I(θ)  - Cramer-Rao bound',
    extra: 'MLE extracts as much information from the data as possible. Under the same conditions, no competing estimator can be systematically more precise.'
  },
  {
    title: 'Invariance',
    body: 'If θ̂ is the MLE of θ, then g(θ̂) is the MLE of g(θ). This makes parameter transformations straightforward.',
    eq: 'MLE[g(θ)] = g(MLE[θ])',
    extra: 'For example, if the MLE for σ² is 4.0, then the MLE for σ is 2.0. This is useful when reparameterizing a model.'
  },
  {
    title: 'Small-sample bias',
    body: 'Despite its strengths, MLE can be biased when n is small. The classical example is variance estimation.',
    eq: 'σ̂²_MLE = (1/n)Σ(xᵢ−x̄)² - biased',
    extra: 'The unbiased estimator divides by (n−1), not by n. This is Bessel\'s correction, which compensates for the finite-sample bias of the MLE.'
  }
];

let current = 0;

function render() {
  const p = props[current];
  document.getElementById('prop-content').innerHTML = `
    <p class="prop-title">${p.title}</p>
    <p class="prop-body">${p.body}</p>
    <p class="prop-eq">${p.eq}</p>
    <p class="prop-body" style="margin-top:10px;font-size:12px;">${p.extra}</p>
  `;
  document.querySelectorAll('.step-dot').forEach((d,i) => d.classList.toggle('active', i === current));
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').textContent = current === props.length - 1 ? '↺ Restart' : 'Next →';
}

function nextStep() { current = (current + 1) % props.length; render(); }
function prevStep() { if (current > 0) { current--; render(); } }

const dotsEl = document.getElementById('step-dots');
props.forEach((_, i) => {
  const d = document.createElement('span');
  d.className = 'step-dot' + (i===0?' active':'');
  dotsEl.appendChild(d);
});
render();
</script>
