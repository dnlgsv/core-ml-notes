
<style>
.ctrl { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:13px; color:var(--color-text-secondary); }
.ctrl span.v { font-weight:500; color:var(--color-text-primary); min-width:40px; }
.mcard { background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:8px 12px; flex:1; text-align:center; }
.mcard .ml { font-size:11px; color:var(--color-text-secondary); margin:0 0 2px; }
.mcard .mv { font-size:17px; font-weight:500; color:var(--color-text-primary); margin:0; }
</style>
<h2 class="sr-only">Интерактивный фиттинг нормального распределения методом MLE</h2>

<div style="padding-top:1rem;">
  <div class="ctrl">
    <span style="min-width:70px;">Истинное μ</span>
    <input type="range" id="mu-true" min="150" max="190" step="1" value="170" style="flex:1;">
    <span class="v" id="mu-true-v">170</span>
  </div>
  <div class="ctrl">
    <span style="min-width:70px;">Истинное σ</span>
    <input type="range" id="sig-true" min="3" max="20" step="1" value="8" style="flex:1;">
    <span class="v" id="sig-true-v">8</span>
  </div>
  <div class="ctrl">
    <span style="min-width:70px;">Размер выборки n</span>
    <input type="range" id="n-size" min="5" max="200" step="1" value="30" style="flex:1;">
    <span class="v" id="n-size-v">30</span>
  </div>

  <div style="display:flex; gap:8px; margin-bottom:12px;">
    <button onclick="resample()">Новая выборка ↗</button>
  </div>

  <div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;">
    <div class="mcard"><p class="ml">Истинное μ</p><p class="mv" id="mu-true-disp">170</p></div>
    <div class="mcard"><p class="ml">MLE μ̂</p><p class="mv" id="mu-hat" style="color:var(--color-text-info);">—</p></div>
    <div class="mcard"><p class="ml">Истинное σ</p><p class="mv" id="sig-true-disp">8</p></div>
    <div class="mcard"><p class="ml">MLE σ̂</p><p class="mv" id="sig-hat" style="color:var(--color-text-info);">—</p></div>
    <div class="mcard"><p class="ml">Лог-правд. ℓ</p><p class="mv" id="log-lik-v" style="font-size:14px;">—</p></div>
  </div>

  <div style="position:relative; height:230px;">
    <canvas id="gauss-chart" role="img" aria-label="Гистограмма данных с подобранной нормальной кривой MLE и истинным распределением"></canvas>
  </div>
  <div style="display:flex; gap:16px; margin-top:8px; font-size:12px; color:var(--color-text-secondary); flex-wrap:wrap;">
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:20px;height:3px;background:#534AB7;display:inline-block;border-radius:1px;"></span>MLE оценка</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:20px;height:0;border-top:2px dashed #D85A30;display:inline-block;"></span>Истинное распределение</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const tc = isDark ? '#c2c0b6' : '#3d3d3a';
const gc = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';

let samples = [];

function randn() {
  let u = 0, v = 0;
  while(u === 0) u = Math.random();
  while(v === 0) v = Math.random();
  return Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
}

function normPDF(x, mu, sigma) {
  return (1/(sigma*Math.sqrt(2*Math.PI))) * Math.exp(-0.5*((x-mu)/sigma)**2);
}

function getParams() {
  return {
    muTrue: parseInt(document.getElementById('mu-true').value),
    sigTrue: parseInt(document.getElementById('sig-true').value),
    n: parseInt(document.getElementById('n-size').value)
  };
}

const xVals = [];
for (let x = 130; x <= 220; x += 0.5) xVals.push(x);

const chart = new Chart(document.getElementById('gauss-chart'), {
  type: 'bar',
  data: {
    labels: xVals,
    datasets: [
      {
        type: 'bar',
        label: 'Данные',
        data: [],
        backgroundColor: isDark ? 'rgba(127,119,221,0.35)' : 'rgba(127,119,221,0.25)',
        borderColor: '#7F77DD',
        borderWidth: 0.5,
        barPercentage: 1.0,
        categoryPercentage: 1.0
      },
      {
        type: 'line',
        label: 'MLE',
        data: [],
        borderColor: '#534AB7',
        borderWidth: 2.5,
        pointRadius: 0,
        tension: 0.3,
        fill: false
      },
      {
        type: 'line',
        label: 'Истинное',
        data: [],
        borderColor: '#D85A30',
        borderWidth: 1.5,
        borderDash: [5, 3],
        pointRadius: 0,
        tension: 0.3,
        fill: false
      }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: {
        ticks: { color: tc, maxTicksLimit: 10, callback: (v, i) => xVals[i] % 10 === 0 ? xVals[i] : '' },
        grid: { color: gc },
        title: { display: true, text: 'x (рост, см)', color: tc, font:{size:11} }
      },
      y: {
        ticks: { color: tc, maxTicksLimit: 5 },
        grid: { color: gc },
        title: { display: true, text: 'Плотность', color: tc, font:{size:11} }
      }
    },
    animation: { duration: 300 }
  }
});

function resample() {
  const { muTrue, sigTrue, n } = getParams();
  samples = Array.from({length: n}, () => muTrue + sigTrue * randn());

  const muHat = samples.reduce((s,x) => s+x, 0) / n;
  const sigHat = Math.sqrt(samples.reduce((s,x) => s+(x-muHat)**2, 0) / n);
  const logLik = samples.reduce((s,x) => s + Math.log(normPDF(x, muHat, sigHat)+1e-20), 0);

  document.getElementById('mu-true-disp').textContent = muTrue;
  document.getElementById('sig-true-disp').textContent = sigTrue;
  document.getElementById('mu-hat').textContent = muHat.toFixed(1);
  document.getElementById('sig-hat').textContent = sigHat.toFixed(1);
  document.getElementById('log-lik-v').textContent = logLik.toFixed(1);

  const binWidth = 2;
  const bins = {};
  for (const s of samples) {
    const b = Math.round(s / binWidth) * binWidth;
    bins[b] = (bins[b] || 0) + 1;
  }
  const histData = xVals.map(x => {
    const b = Math.round(x / binWidth) * binWidth;
    return b === x ? (bins[b] || 0) / (n * binWidth) : null;
  });

  chart.data.datasets[0].data = histData;
  chart.data.datasets[1].data = xVals.map(x => normPDF(x, muHat, sigHat));
  chart.data.datasets[2].data = xVals.map(x => normPDF(x, muTrue, sigTrue));
  chart.update();
}

['mu-true','sig-true','n-size'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    document.getElementById(id+'-v').textContent = this.value;
  });
});

resample();
</script>
