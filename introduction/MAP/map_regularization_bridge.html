<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --card: #f6f8fa;
    --border: #d0d7de;
    --text: #24292f;
    --muted: #57606a;
    --accent: #534ab7;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1f1f1f;
      --card: #2a2a2a;
      --border: #444c56;
      --text: #d7d9de;
      --muted: #a8adb7;
      --accent: #9b92ff;
    }
  }

  body {
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }

  label {
    display: block;
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 7px;
  }

  input { width: 100%; }

  .formula {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    gap: 10px;
    align-items: stretch;
    margin-bottom: 14px;
  }

  .term {
    min-height: 92px;
    display: grid;
    align-content: center;
    text-align: center;
  }

  .operator {
    display: grid;
    place-items: center;
    color: var(--muted);
    font-size: 28px;
  }

  .name {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 6px;
  }

  .math {
    font-size: 18px;
    font-weight: 600;
  }

  .note {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
    margin: 0;
  }

  .bars {
    display: grid;
    gap: 8px;
    margin-top: 12px;
  }

  .bar {
    height: 12px;
    border-radius: 99px;
    background: var(--border);
    overflow: hidden;
  }

  .fill {
    height: 100%;
    width: 50%;
    background: var(--accent);
  }

  @media (max-width: 760px) {
    .controls, .formula { grid-template-columns: 1fr; }
    .operator { display: none; }
  }
</style>

<div class="controls">
  <div class="card">
    <label for="strength">Prior strength lambda: <span id="strengthVal">1.0</span></label>
    <input id="strength" type="range" min="0" max="5" value="1" step="0.1">
  </div>
  <div class="card">
    <label for="prior">Prior type</label>
    <select id="prior" style="width:100%; padding:7px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text);">
      <option value="gaussian">Gaussian prior -> L2</option>
      <option value="laplace">Laplace prior -> L1</option>
    </select>
  </div>
</div>

<div class="formula">
  <div class="card term">
    <div class="name">Negative log-posterior</div>
    <div class="math">-log P(w | D)</div>
  </div>
  <div class="operator">=</div>
  <div class="card term">
    <div class="name">Data fit</div>
    <div class="math">-log P(D | w)</div>
  </div>
  <div class="operator">+</div>
  <div class="card term">
    <div class="name">Prior penalty</div>
    <div class="math" id="penalty">lambda ||w||2^2 / 2</div>
  </div>
</div>

<div class="card">
  <p class="note" id="explain">
    A Gaussian prior gives a quadratic penalty. Increasing lambda means the prior puts more pressure on weights to stay near zero.
  </p>
  <div class="bars">
    <div>
      <label>Data term influence</label>
      <div class="bar"><div class="fill" id="dataBar"></div></div>
    </div>
    <div>
      <label>Prior term influence</label>
      <div class="bar"><div class="fill" id="priorBar"></div></div>
    </div>
  </div>
</div>

<script>
  const strength = document.getElementById("strength");
  const prior = document.getElementById("prior");
  const strengthVal = document.getElementById("strengthVal");
  const penalty = document.getElementById("penalty");
  const explain = document.getElementById("explain");
  const dataBar = document.getElementById("dataBar");
  const priorBar = document.getElementById("priorBar");

  function render() {
    const lambda = Number(strength.value);
    const priorWeight = lambda / 5;
    strengthVal.textContent = lambda.toFixed(1);
    dataBar.style.width = `${Math.max(8, 100 - priorWeight * 75)}%`;
    priorBar.style.width = `${Math.max(2, priorWeight * 100)}%`;

    if (prior.value === "gaussian") {
      penalty.textContent = "lambda ||w||2^2 / 2";
      explain.textContent = "A Gaussian prior gives a quadratic penalty. Increasing lambda means the prior puts more pressure on weights to stay near zero.";
    } else {
      penalty.textContent = "lambda ||w||1";
      explain.textContent = "A Laplace prior gives an absolute-value penalty. It has a sharp peak at zero, so MAP often sets some weights exactly to zero.";
    }
  }

  strength.addEventListener("input", render);
  prior.addEventListener("change", render);
  render();
</script>
