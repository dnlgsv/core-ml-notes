<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$','$$'], ['\\[','\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script','noscript','style','textarea','pre','code']
    }
  };
  </script>
<style>
  @media (min-width: 800px) {
    :root {
      --sidebar-width: 280px;
    }

    .side-bar {
      width: var(--sidebar-width) !important;
      min-width: var(--sidebar-width) !important;
      transition: transform 180ms ease;
    }

    .site-header,
    .site-nav,
    .site-footer {
      width: var(--sidebar-width) !important;
    }

    .site-header,
    .site-nav {
      padding-left: 32px !important;
      padding-right: 28px !important;
    }

    .main {
      margin-left: var(--sidebar-width) !important;
      max-width: none !important;
      transition: margin-left 180ms ease;
    }

    .main-header {
      left: var(--sidebar-width) !important;
      transition: left 180ms ease;
    }

    .main-content-wrap {
      max-width: 1200px !important;
    }

    .main-content {
      max-width: 980px !important;
    }

    .sidebar-toggle {
      position: fixed;
      top: 104px;
      left: calc(var(--sidebar-width) - 14px);
      z-index: 1000;
      width: 28px;
      height: 44px;
      border: 1px solid #d0d7de;
      border-radius: 999px;
      background: #fff;
      color: #5a6472;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(31, 35, 40, 0.08);
      transition: left 180ms ease, background 120ms ease, color 120ms ease;
    }

    .sidebar-toggle:hover {
      background: #f6f8fa;
      color: #4f46e5;
    }

    .sidebar-toggle:focus-visible {
      outline: 3px solid rgba(83, 74, 183, 0.35);
      outline-offset: 2px;
    }

    html.sidebar-collapsed-pending .side-bar,
    body.sidebar-collapsed .side-bar {
      transform: translateX(calc(-1 * var(--sidebar-width)));
    }

    html.sidebar-collapsed-pending .main,
    body.sidebar-collapsed .main {
      margin-left: 0 !important;
    }

    html.sidebar-collapsed-pending .main-header,
    body.sidebar-collapsed .main-header {
      left: 0 !important;
    }

    html.sidebar-collapsed-pending .main-content,
    body.sidebar-collapsed .main-content {
      max-width: 1120px !important;
    }

    body.sidebar-collapsed .sidebar-toggle {
      left: 12px;
    }
  }

  @media (max-width: 799px) {
    .sidebar-toggle {
      display: none;
    }
  }

  @media (prefers-color-scheme: dark) {
    .sidebar-toggle {
      background: #2a2a2a;
      border-color: #444c56;
      color: #d7d9de;
    }

    .sidebar-toggle:hover {
      background: #343434;
      color: #a5b4fc;
    }
  }
</style>
<script>
  (function () {
    var storageKey = 'coreMlNotesSidebarCollapsed';
    if (localStorage.getItem(storageKey) === 'true') {
      document.documentElement.classList.add('sidebar-collapsed-pending');
    }

    document.addEventListener('DOMContentLoaded', function () {
      var collapsed = localStorage.getItem(storageKey) === 'true';
      var button = document.createElement('button');
      button.className = 'sidebar-toggle';
      button.type = 'button';
      button.title = collapsed ? 'Show sidebar' : 'Hide sidebar';
      button.setAttribute('aria-label', collapsed ? 'Show sidebar' : 'Hide sidebar');
      button.setAttribute('aria-pressed', collapsed ? 'true' : 'false');

      function render() {
        var isCollapsed = document.body.classList.contains('sidebar-collapsed');
        button.textContent = isCollapsed ? '\u203a' : '\u2039';
        button.title = isCollapsed ? 'Show sidebar' : 'Hide sidebar';
        button.setAttribute('aria-label', isCollapsed ? 'Show sidebar' : 'Hide sidebar');
      }

      if (collapsed) {
        document.body.classList.add('sidebar-collapsed');
      }
      document.documentElement.classList.remove('sidebar-collapsed-pending');

      render();
      button.addEventListener('click', function () {
        var isCollapsed = document.body.classList.toggle('sidebar-collapsed');
        document.documentElement.classList.remove('sidebar-collapsed-pending');
        localStorage.setItem(storageKey, isCollapsed ? 'true' : 'false');
        button.setAttribute('aria-pressed', isCollapsed ? 'true' : 'false');
        render();
      });

      document.body.appendChild(button);
    });
  }());
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
