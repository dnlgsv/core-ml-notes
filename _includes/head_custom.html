<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$','$$'], ['\\[','\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script','noscript','style','textarea','pre','code']
    }
  };
  </script>
<style>
  .sidebar-toggle {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 1000;
    width: 38px;
    height: 38px;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    background: #fff;
    color: #2a2f36;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(31, 35, 40, 0.08);
  }

  .sidebar-toggle:hover {
    background: #f6f8fa;
  }

  .sidebar-toggle:focus-visible {
    outline: 3px solid rgba(83, 74, 183, 0.35);
    outline-offset: 2px;
  }

  html.sidebar-collapsed-pending .side-bar,
  body.sidebar-collapsed .side-bar {
    transform: translateX(-100%);
  }

  html.sidebar-collapsed-pending .main,
  body.sidebar-collapsed .main {
    margin-left: 0;
  }

  html.sidebar-collapsed-pending .main-header,
  body.sidebar-collapsed .main-header {
    left: 0;
  }

  html.sidebar-collapsed-pending .main-content,
  body.sidebar-collapsed .main-content {
    max-width: 1100px;
  }

  @media (max-width: 799px) {
    .sidebar-toggle {
      display: none;
    }
  }

  @media (prefers-color-scheme: dark) {
    .sidebar-toggle {
      background: #2a2a2a;
      border-color: #444c56;
      color: #d7d9de;
    }

    .sidebar-toggle:hover {
      background: #343434;
    }
  }
</style>
<script>
  (function () {
    var storageKey = 'coreMlNotesSidebarCollapsed';
    if (localStorage.getItem(storageKey) === 'true') {
      document.documentElement.classList.add('sidebar-collapsed-pending');
    }

    document.addEventListener('DOMContentLoaded', function () {
      var collapsed = localStorage.getItem(storageKey) === 'true';
      var button = document.createElement('button');
      button.className = 'sidebar-toggle';
      button.type = 'button';
      button.setAttribute('aria-label', 'Toggle sidebar');
      button.setAttribute('aria-pressed', collapsed ? 'true' : 'false');

      function render() {
        button.textContent = document.body.classList.contains('sidebar-collapsed') ? '\u2630' : '\u00d7';
      }

      if (collapsed) {
        document.body.classList.add('sidebar-collapsed');
      }
      document.documentElement.classList.remove('sidebar-collapsed-pending');

      render();
      button.addEventListener('click', function () {
        var isCollapsed = document.body.classList.toggle('sidebar-collapsed');
        document.documentElement.classList.remove('sidebar-collapsed-pending');
        localStorage.setItem(storageKey, isCollapsed ? 'true' : 'false');
        button.setAttribute('aria-pressed', isCollapsed ? 'true' : 'false');
        render();
      });

      document.body.appendChild(button);
    });
  }());
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
